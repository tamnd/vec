# GoReleaser turns one tag push into everything a user can install from: raw
# archives, Linux packages (deb, rpm, apk), a multi-arch container image, and
# entries for Homebrew and Scoop. `git tag vX.Y.Z && git push --tags` fans out
# to all of them through .github/workflows/release.yml.
#
# Publish steps that push to a repository that may not exist yet (the Homebrew
# tap, the Scoop bucket) self-disable when their token is absent. A release with
# no extra secrets still produces every downloadable artifact and the container
# image; each manager lights up the moment its repository and token exist.
version: 2

project_name: vec

before:
  # Only fetch modules; never `go mod tidy` during a release, the tree is kept
  # tidy in CI.
  hooks:
    - go mod download

builds:
  - id: vec
    binary: vec
    main: ./cmd/vec
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tamnd/vec.version={{ .Version }}
      - -X github.com/tamnd/vec.commit={{ .ShortCommit }}
      - -X github.com/tamnd/vec.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_7
      - linux_386
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64
      - freebsd_amd64
      - freebsd_arm64

archives:
  # tar.gz everywhere except a zip on Windows.
  - id: default
    ids:
      - vec
    name_template: "vec_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  # One nfpm definition emits the deb, rpm, and apk for every Linux build. vec is
  # a single static binary with no daemon and no config, so the package is the
  # binary and its license: no unit file, no postinstall.
  - id: linux-packages
    package_name: vec
    ids:
      - vec
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: tamnd
    homepage: https://github.com/tamnd/vec
    maintainer: Duc-Tam Nguyen <tamnd87@gmail.com>
    description: Embedded single-file vector database in pure Go with the look and feel of SQLite.
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/vec/LICENSE

dockers_v2:
  # One multi-platform image built with buildx. GoReleaser stages the prebuilt
  # binaries under per-platform directories in the build context and the
  # Dockerfile copies the right one through $TARGETPLATFORM.
  - images:
      - ghcr.io/tamnd/vec
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "Embedded single-file vector database in pure Go with the look and feel of SQLite"
      org.opencontainers.image.url: "https://github.com/tamnd/vec"
      org.opencontainers.image.source: "https://github.com/tamnd/vec"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: "Apache-2.0"

homebrew_casks:
  # Homebrew cask pushed to the tap repository. Self-disables until
  # HOMEBREW_TAP_GITHUB_TOKEN (a PAT with write to tamnd/homebrew-tap) is set, so
  # a tokenless release still writes the cask into dist for inspection.
  - name: vec
    ids:
      - default
    repository:
      owner: tamnd
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/tamnd/vec
    description: Embedded single-file vector database in pure Go with the look and feel of SQLite
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

scoops:
  # Scoop manifest for Windows, pushed to the bucket repository.
  - ids:
      - default
    repository:
      owner: tamnd
      name: scoop-bucket
      token: '{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}'
    directory: bucket
    homepage: https://github.com/tamnd/vec
    description: Embedded single-file vector database in pure Go with the look and feel of SQLite
    license: Apache-2.0
    skip_upload: '{{ if index .Env "SCOOP_BUCKET_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  # A CycloneDX SBOM per archive via syft; the release workflow installs it.
  - id: archive
    artifacts: archive

signs:
  # Keyless cosign signature over the checksum file. It runs only on a real
  # release in CI, where the workflow grants the OIDC token cosign needs.
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: tamnd
    name: vec
  draft: false
  prerelease: auto
