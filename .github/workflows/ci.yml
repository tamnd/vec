name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-flight run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test on Linux and macOS. The build asserts the pure-Go path with
  # cgo off; tests run with the race detector, which needs cgo on. gofmt and vet
  # run here too so a formatting slip fails fast on both platforms.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build (pure Go, no cgo)
        env:
          CGO_ENABLED: "0"
        run: go build ./...
      # The race detector adds about a 10x slowdown. Every package except index
      # is cheap under it, so they run with the race detector and produce the
      # coverage profile here.
      - name: test (race)
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 -timeout 20m -coverprofile=coverage.out $(go list ./... | grep -v '/index$')
      # The index package builds HNSW, IVF, Vamana and SPANN graphs over
      # thousands of vectors and asserts recall, so the race detector pushes it
      # past a sane CI budget. Run the full-size recall and persistence suite
      # without the race detector, then run only the genuinely concurrent test
      # (concurrent search and insert) with the race detector, which is where a
      # data race could actually live.
      - name: test index (full size, no race)
        env:
          CGO_ENABLED: "1"
        run: go test -count=1 -timeout 15m ./index/
      - name: test index concurrency (race)
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 -timeout 10m -run TestHNSWConcurrentSearchInsert ./index/
      - name: coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1

  # golangci-lint bundles staticcheck, govet, ineffassign, errcheck and more, so
  # it is the main quality gate.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  # Scan the module and its dependencies for known vulnerabilities. This job
  # uses the latest stable Go rather than the module's pinned 1.23, since the
  # govulncheck tool tracks a recent toolchain; it still analyzes a go1.23
  # module correctly.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Confirm go.mod and go.sum are tidy: a PR that adds an import without running
  # go mod tidy fails here instead of breaking a later release.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
